name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

jobs:
  backend:
    name: Django Backend

    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: platform

    services:
      postgres:
        image: postgres:16.9

        env:
          POSTGRES_DB: datavion
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: django-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1

      DATABASE_NAME: datavion
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'EOF'
          import socket
          import time
          import sys

          host = "localhost"
          port = 5432

          for i in range(30):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print("✅ PostgreSQL is ready.")
                      sys.exit(0)
              except OSError:
                  print(f"Waiting for PostgreSQL... ({i+1}/30)")
                  time.sleep(2)

          raise RuntimeError("❌ PostgreSQL did not become ready.")
          EOF

      - name: Verify PostgreSQL Connection
        run: |
          python - <<'EOF'
          import psycopg

          conn = psycopg.connect(
              dbname="datavion",
              user="postgres",
              password="postgres",
              host="localhost",
              port=5432,
          )

          print("✅ Connected to PostgreSQL successfully!")
          conn.close()
          EOF

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: isort
        run: isort . --check-only

      - name: Run Migrations
        run: python manage.py migrate

      - name: Django Check
        run: python manage.py check

      - name: Run Tests
        run: python manage.py test
